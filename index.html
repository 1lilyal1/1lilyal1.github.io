<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<link rel="stylesheet" type="text/css" href="CSS/styleTable.css">
		<link rel="stylesheet" type="text/css" href="CSS/demo.css">
		<link rel="stylesheet" type="text/css" href="CSS/styleFilter.css">
		
		<title>Таблица с скругленными уголками</title>
		<script src="Java/java.js"></script>
	</head>
	<body>
		<input type="file" id="file"  accept=".csv" onchange="readFile(this)">
		<!-- <button onclick="readFile(document.getElementById('file'))">Read!</button> -->
		<div id="out"></div>	
		</div>
		<div>
			<div style="margin: 1%; float: left;">
				<input type="text" id="InputMapsFilter" oninput="InputTextFilter('InputMapsFilter','#MapsDiv label')" >
				<div class="ScrollClass" id="MapsDiv"></div>
				<input type="button" value="Chek all" onclick="ChekBoxIsChecked('#MapsDiv label input', true)"> 
				<input type="button" value="Un chek all" onclick="ChekBoxIsChecked('#MapsDiv label input', false)"> 
				<input type="button" value="Standard maps" onclick="ChekPattern('#MapsDiv label',0)"> 
			</div>
			<div style="margin: 1%; float: left;">
				<input type="text" id="InputPlayerFilter" oninput="InputTextFilter('InputPlayerFilter','#PlayerDiv label')">
				<div class="ScrollClass" id="PlayerDiv"></div>
				<input type="button" value="Chek all" onclick="ChekBoxIsChecked('#PlayerDiv label input', true)"> 
				<input type="button" value="Un chek all" onclick="ChekBoxIsChecked('#PlayerDiv label input', false)">
				<input type="button" value="Top 30 chek elo" onclick="ChekPattern('#PlayerDiv label',1)">  
			</div>
		</div>


		<table>
			<thead>
				<tr>
					<th>Races</th>
					<th>% win</th>
					<th>Win</th>
					<th>Loses</th>
				</tr>
			</thead>
			<tbody id="TableRaceOut">

			</tbody>
		</table>

		<table>
			<thead>
				<tr>
					<th> </th>
					<th>vs h</th>
					<th>vs o</th>
					<th>vs u</th>
					<th>vs n</th>
				</tr>
			</thead>
			<tbody id="TableMatchupOut">

			</tbody>
		</table>
	</body>
</html>
